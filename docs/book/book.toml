[book]
title = "camdl"
description = "Compartmental Model Description Language"
authors = ["Vince Buffalo"]
language = "en"
src = "src"

[build]
build-dir = "../../target/book"

# KaTeX math rendering — disabled until mdbook-katex supports mdbook 0.5.x
