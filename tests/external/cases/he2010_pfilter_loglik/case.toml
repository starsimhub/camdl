name = "he2010_pfilter_loglik"
description = """
Particle-filter log-likelihood of He et al. (2010) London measles at
the published MLE. Sibling to he2010_forward but exercises a
different slice of the stack: where he2010_forward validates the
process model and the cohort/birth pipeline, this case validates
the particle filter, the observation-likelihood evaluation, and
the resampling algorithm. Compares camdl's `pfilter` against
pomp's `pfilter()` at matched parameters, particle count, and
time grid.

Note on obs-model asymmetry: pomp uses a discretised Normal
(pnorm(y+0.5) - pnorm(y-0.5)) while camdl uses continuous Normal
density. This yields a small but systematic log-lik offset; the
tolerance on the mean absorbs it. The value we're protecting is
agreement *modulo that offset*, which is still tight enough to
catch pf resampling / likelihood-evaluation bugs — those move the
mean by tens to hundreds of nats, well above the obs-model
discretisation offset (~log(cases_per_obs), ~10 nats total
across 1096 observations for this data).
"""
category = "pfilter"

[camdl]
model          = "model.camdl"
params         = "params.toml"
mode           = "batch-replicated"
batch_seed_col = "seed"
# One invocation, N replicates. @batch_out becomes the TSV path the
# harness reads as a long-format (seed, loglik) table.
command = [
    "camdl", "pfilter",
    "@model", "--params", "@params",
    "--data", "data/he2010_london_cases.tsv",
    "--particles", "2000",
    "--replicates", "@n_seeds",
    "--seed", "@seed_base",
    "--output", "@batch_out",
]
n_seeds   = 10
seed_base = 42

[reference]
kind         = "r-pomp"
run          = "reference/run.sh"
ensemble_tsv = "reference/out/pomp_pfilter_loglik.tsv"
seed_col     = "sim"

# Both sides write a long-format (seed, loglik) TSV. Column rename
# not needed — camdl's `seed` and pomp's `loglik` line up.
#
# Aggregate `mean` on a one-row-per-seed loglik column gives back
# the scalar loglik per seed, which is exactly what we want.
[summary]
kind = "ensemble-stats"
stats = [
    { name = "loglik", aggregate = "mean", over = "loglik", scope = "per-seed" },
]
