# Flu-like outbreak in a village of 1000. Classic R0 sensitivity analysis.
# Compares R0=2 vs R0=5 with Gillespie to characterise stochastic variation
# in peak timing and final size.

[config]
model = "ocaml/golden/sir_basic.camdl"
params = "ocaml/golden/sir_basic.params.toml"
backend = "gillespie"

[config.seeds]
n = 25

[[scenario]]
name = "low_r0"
params = { beta = 0.2, gamma = 0.1 }

[[scenario]]
name = "high_r0"
params = { beta = 0.5, gamma = 0.1 }
