# Polio model extended with sinusoidal seasonal forcing (N=1M).
# Tau-leap is essential at this population size.
# Assesses whether SIA impact changes under seasonal transmission.

[config]
model   = "ocaml/golden/seir_vaccine_seasonal.camdl"
params  = "ocaml/golden/seir_vaccine_seasonal.params.toml"
backend = "tau_leap"
dt      = 1.0

[config.seeds]
n = 15

[[scenario]]
name   = "no_vacc"
params = { vacc_frac = 0.0 }

[[scenario]]
name   = "high_vacc"
params = { vacc_frac = 0.8 }
