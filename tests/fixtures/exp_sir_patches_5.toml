# Five spatially heterogeneous regions with patch-specific R0 values.
# Tau-leap (dt=0.5d) compares fast recovery (~5d infectious) vs
# slow recovery (~14d infectious) across all patches simultaneously.

[config]
model   = "ocaml/golden/sir_patches_5.camdl"
params  = "ocaml/golden/sir_patches_5.params.toml"
backend = "tau_leap"
dt      = 0.5

[config.seeds]
n = 20

[[scenario]]
# Slow recovery: ~14d infectious period; R0[p] = R0_target[p] * gamma
name   = "slow_recovery"
params = { gamma = 0.07 }

[[scenario]]
# Fast recovery: ~5d infectious period
name   = "fast_recovery"
params = { gamma = 0.2 }
