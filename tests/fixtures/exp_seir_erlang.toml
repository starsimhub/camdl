# COVID-like vs Ebola-like incubation period comparison.
# Both scenarios hold R0≈3 so only the epidemic shape (not magnitude) differs.
# Gillespie over a 160-day horizon.

[config]
model = "ocaml/golden/seir_erlang.camdl"
params = "ocaml/golden/seir_erlang.params.toml"
backend = "gillespie"

[config.seeds]
n = 20

[[scenario]]
# Short incubation (~1.7d mean): COVID-like, σ=0.6, β=0.45 → R0≈3
name = "short_incubation"
params = { beta = 0.45, sigma = 0.6 }

[[scenario]]
# Long incubation (~5d mean): Ebola-like, σ=0.2, β=0.3 → R0≈3
name = "long_incubation"
params = { beta = 0.3, sigma = 0.2 }
