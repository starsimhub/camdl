# Childhood disease with age-structured SIR and demographic turnover.
# Chain-binomial (dt=1d) compares R0≈4 vs R0≈2 across five age groups.

[config]
model   = "ocaml/golden/sir_five_age.camdl"
params  = "ocaml/golden/sir_five_age.params.toml"
backend = "chain_binomial"
dt      = 1.0

[config.seeds]
n = 20

[[scenario]]
name   = "fast_epidemic"
params = { beta = 0.4, gamma = 0.1 }

[[scenario]]
name   = "slow_epidemic"
params = { beta = 0.2, gamma = 0.1 }
