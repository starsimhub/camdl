name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Full build + test (Linux, existing pipeline) ──────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── OCaml ──────────────────────────────────────────
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true

      - name: Install OCaml dependencies
        run: |
          cd ocaml
          opam install . --deps-only --with-test --yes

      - name: Build OCaml
        run: opam exec -- make build-ocaml

      - name: Test OCaml
        run: opam exec -- bash -c "cd ocaml && dune runtest"

      # ── Rust ───────────────────────────────────────────
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Build Rust
        run: make build-rust

      - name: Clippy
        run: cd rust && cargo clippy --all-targets -- -D warnings

      - name: Rust unit tests
        run: cd rust && cargo test

      # ── Integration ────────────────────────────────────
      - name: Update golden files
        run: opam exec -- make update-golden

      - name: Check golden files unchanged
        run: git diff --exit-code ir/golden/ ocaml/golden/

      - name: Integration tests
        run: opam exec -- make test

  # ── Rust tests on Windows ─────────────────────────────────────────
  test-rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        run: cargo test --release
        working-directory: rust

  # ── Rust tests on macOS ───────────────────────────────────────────
  test-rust-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        run: cargo test --release
        working-directory: rust

  # ── Build release artifacts (all platforms) ───────────────────────
  build-artifacts:
    needs: [test-rust-windows, test-rust-macos]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
            exe: camdl
          - os: macos-latest
            suffix: macos-arm64
            exe: camdl
          - os: windows-latest
            suffix: windows-x64
            exe: camdl.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p cli
        working-directory: rust

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          ls -la rust/target/release/camdl* || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "rust/target/release/${{ matrix.exe }}" dist/camdl.exe
          else
            cp "rust/target/release/${{ matrix.exe }}" dist/camdl
            chmod +x dist/camdl
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: camdl-${{ matrix.suffix }}
          path: dist/
