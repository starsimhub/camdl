name: CI

# Runs on every push / PR to main. Linux-only — cross-platform builds
# are gated behind tags (see release.yml) because macOS runners are
# billed 10× and Windows 2× the Linux rate, and the Rust code is
# platform-invariant (no OS-conditional cfgs).
#
# Doc-only and fixture-only changes skip this workflow.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── OCaml ──────────────────────────────────────────
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true

      - name: Install OCaml dependencies
        run: |
          cd ocaml
          opam install . --deps-only --with-test --yes

      - name: Build OCaml
        run: opam exec -- make build-ocaml

      - name: Test OCaml
        run: opam exec -- bash -c "cd ocaml && dune runtest"

      # ── Rust ───────────────────────────────────────────
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Build Rust
        run: make build-rust

      - name: Clippy
        run: cd rust && cargo clippy --all-targets -- -D warnings

      # ── Install camdlc to ~/.local/bin + put on PATH ───
      # Several Rust integration tests (`scenario_runtime_application`,
      # `synthetic_fit_grid`, …) shell out to the built `camdl` binary,
      # which in turn needs to locate `camdlc` to compile inline .camdl
      # sources. `make install` puts camdlc at ~/.local/bin/camdlc; we
      # export that directory so the spawned binary's PATH search finds
      # it.
      - name: Install camdlc on PATH
        run: |
          opam exec -- make install
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Rust tests
        run: cd rust && cargo test

      # ── Integration ────────────────────────────────────
      - name: Update golden files
        run: opam exec -- make update-golden

      - name: Check golden files unchanged
        run: git diff --exit-code ir/golden/ ocaml/golden/

      - name: Integration tests
        run: opam exec -- make test-integration
