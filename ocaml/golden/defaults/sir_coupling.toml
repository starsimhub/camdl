label       = "SIR + age coupling"
description = "Coupling syntax with contact matrix"

# Contact matrix C_age hardcoded: [[10,3],[3,7]]
# Effective R0 ≈ β · ρ(C) / γ where ρ(C) ≈ 11.4

[descriptions]
beta  = "transmission rate per contact (day⁻¹) — scales the off-diagonal coupling terms"
gamma = "recovery rate (day⁻¹) — mean infectious period = 1/γ"
N0    = "initial population per age group"
I0    = "initial infectious count in the young group"

[[params]]
name  = "default"
label = "default"
t_end = 80.0
beta  = 0.05
gamma = 0.1
N0    = 1000.0
I0    = 10.0

[[params]]
name  = "high_coupling"
label = "high coupling  (strong cross-mixing)"
t_end = 60.0
beta  = 0.09
gamma = 0.1
N0    = 1000.0
I0    = 5.0
