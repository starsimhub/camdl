label       = "SEIR + Erlang latent"
description = "Erlang-3 latent period staging"

# 3 latent sub-stages → CV of latent period = 1/sqrt(3) ≈ 0.58
# Mean total latent period = 1/σ days; each stage fires at rate 3σ

[descriptions]
beta  = "transmission rate (day⁻¹) — R0 = β/γ"
sigma = "per-stage progression rate (day⁻¹) — mean total latent period = 1/σ"
gamma = "recovery rate (day⁻¹) — mean infectious period = 1/γ"

[[params]]
name  = "default"
label = "default  (latent = 5d)"
t_end = 180.0
beta  = 0.3
sigma = 0.2
gamma = 0.1

[[params]]
name  = "slow_progression"
label = "slow progression  (latent = 10d)"
t_end = 250.0
beta  = 0.3
sigma = 0.1
gamma = 0.1
