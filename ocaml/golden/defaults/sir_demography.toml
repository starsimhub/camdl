label       = "SIR + demography"
description = "Birth/death flows, 5-year run"

[descriptions]
beta  = "transmission rate (day⁻¹)"
gamma = "recovery rate (day⁻¹) — mean infectious period = 1/γ"
mu    = "birth/death rate (day⁻¹) — mean lifespan = 1/μ; try 0.000027 (100yr) or 0.00027 (10yr)"
N0    = "initial population size"
I0    = "initial number of infectious individuals"

[[params]]
name  = "default"
label = "default  (R0 ≈ 2.9)"
t_end = 365.0
beta  = 0.3
gamma = 0.1
mu    = 0.000027
N0    = 10000.0
I0    = 100.0

[[params]]
name  = "endemic"
label = "endemic  (high turnover)"
t_end = 3650.0
beta  = 0.3
gamma = 0.1
mu    = 0.00027
N0    = 10000.0
I0    = 10.0
