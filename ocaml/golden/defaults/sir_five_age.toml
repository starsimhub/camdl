label       = "SIR + 5 age groups"
description = "Consecutive aging, birth/death"

# age_dur table hardcoded: [5, 10, 35, 15, 20] years
# Aging rates = 1/age_dur[a]; final group has no aging-out transition

[descriptions]
beta  = "transmission rate (day⁻¹) — uniform force of infection across age groups"
gamma = "recovery rate (day⁻¹) — mean infectious period = 1/γ"
mu    = "birth/death rate (day⁻¹) — mean lifespan = 1/μ"

[[params]]
name  = "default"
label = "default"
t_end = 500.0
beta  = 0.4
gamma = 0.1
mu    = 0.000027

[[params]]
name  = "slow"
label = "slow epidemic  (R0 ≈ 2)"
t_end = 730.0
beta  = 0.2
gamma = 0.1
mu    = 0.000027
