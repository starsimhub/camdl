# EVSI of Environmental Surveillance (ES) for SIA targeting
#
# 50-patch polio-like model with heterogeneous vaccination coverage.
# Decision: how broadly to target supplementary immunization (SIA).
# Study: ES — test k patches for poliovirus → k ~ Binomial(n_sites, p_positive)
#
# p_positive = fraction of 50 patches where beta*(1-cov_p)/gamma > 1
# (pre-computed by postprocess.py and added to parameter_points.tsv)
#
# Three decisions:
#   no_sia    — no SIA (cost = 0)
#   target_10 — SIA in 10 lowest-coverage patches (cost ~36K cases-equivalent)
#   sia_all   — SIA in all 50 patches (cost ~78K cases-equivalent)
#
# Costs calibrated as: N_vaccinated × vacc_frac × 0.049 cases-per-dose-equivalent
#   target_10:  915,060  × 0.80 × 0.049 ≈ 35,878  → 36,000
#   sia_all:  1,999,204  × 0.80 × 0.049 ≈ 78,361  → 78,000
#
# At low beta (R0_eff < 1 in most patches): no_sia wins (epidemic fizzles anyway)
# At medium beta: target_10 wins (low-cov patches are hot spots; sia_all is wasteful)
# At high beta:   sia_all wins (widespread transmission; broad coverage needed)
#
# Run from repo root:
#   camdl-sim experiment run      examples/polio_es/experiment.toml --parallel 8
#   camdl-sim experiment summarize examples/polio_es/experiment.toml
#   python3 examples/polio_es/postprocess.py
#   camdl-sim voi run             examples/polio_es/voi.toml

[voi]
experiment = "examples/polio_es/experiment.toml"
design     = "prior"

[decision]
actions    = ["no_sia", "target_10", "sia_all"]
reference  = "no_sia"
utility    = "total_cases"
direction  = "minimize"

[decision.cost]
target_10 = 36000.0
sia_all   = 78000.0

[study.es]
parameter    = "p_positive"
likelihood   = "binomial"
sample_sizes = [5, 10, 20, 30, 50]
