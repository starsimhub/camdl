# EVSI of Environmental Surveillance for SIA targeting
#
# 50-patch SIR model with heterogeneous vaccination coverage.
# Uncertain: beta (transmission intensity), gamma (recovery rate).
# Decision: how many patches to target for SIA, before vs after ES.
#
# Run from repo root:
#   camdl batch      examples/polio_es/experiment.toml --parallel 8
#   # camdl (removed: experiment summarize) examples/polio_es/experiment.toml
#   python3 examples/polio_es/add_p_positive.py
#   camdl voi run             examples/polio_es/voi.toml

[config]
model = "examples/polio_es/polio_es_50.ir.json"
params = "examples/polio_es/params.toml"
backend = "ode"
seeds = { n = 3 }
parallel = 8
output_dir = "examples/polio_es/output"

[config.simulate]
from = 0.0
to = 365.0

[design.prior]
method = "sobol"
n = 512

[design.prior.parameters.beta]
range = { min = 0.05, max = 1.0 }
transform = "log"
prior = { dist = "log_normal", mu = -1.2, sigma = 0.6 }

[design.prior.parameters.gamma]
range = { min = 0.05, max = 0.40 }
transform = "log"
prior = { dist = "log_normal", mu = -2.1, sigma = 0.4 }

[[scenario]]
name = "no_sia"

[[scenario]]
name = "target_10"
enable = ["sia_p0", "sia_p1", "sia_p2", "sia_p3", "sia_p4", "sia_p5", "sia_p6", "sia_p7", "sia_p8", "sia_p9"]

